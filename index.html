<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a192f;
  color:#e0f2fe;
}
.container{max-width:500px;margin:auto;padding:20px;}
.card{
  background:#0f172a;
  border:1px solid #1e3a8a;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
input{
  background:#020617;
  color:white;
  border:1px solid #1e3a8a;
}
button{
  background:#2563eb;
  color:white;
}
.hidden{display:none;}
#reader{width:100%;}
li{
  background:#020617;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<!-- REGISTRO -->
<div id="registro" class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<input id="celular" placeholder="Celular">
<button onclick="registrar()">Entrar</button>
<p id="msg"></p>
</div>

<!-- INVITADO -->
<div id="invitado" class="card hidden">
<h2>Tu acceso</h2>
<div id="qr"></div>
<p id="info"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div class="card">
<h2>Planeación</h2>
<input id="planNombre" placeholder="Nombre invitado">
<button onclick="agregarPlaneacion()">Agregar</button>
<ul id="listaPlan"></ul>
</div>

<div class="card">
<h2>Invitados</h2>
<ul id="listaInvitados"></ul>
</div>

<div class="card">
<h2>Escáner</h2>
<button onclick="iniciarEscaner()">Abrir cámara</button>
<div id="reader"></div>
</div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API",
  authDomain: "TU_DOMINIO",
  projectId: "TU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔥 NORMALIZAR NOMBRE */
function norm(text){
  return text.trim().toLowerCase();
}

/* 🔐 REGISTRO SIMPLE */
function registrar(){

  const nombre = norm(document.getElementById("nombre").value);
  const celular = document.getElementById("celular").value;

  if(!nombre || !celular){
    msg.innerText="Completa datos";
    return;
  }

  db.collection("invitados")
    .where("nombre","==",nombre)
    .get()
    .then(res=>{

      // si ya existe = login
      if(!res.empty){
        mostrarUsuario(nombre);
        return;
      }

      // validar planeación
      db.collection("planeacion").get().then(snap=>{
        let ok=false;

        snap.forEach(d=>{
          if(norm(d.data().nombre) === nombre){
            ok=true;
          }
        });

        if(!ok){
          msg.innerText="No estás en lista";
          return;
        }

        db.collection("invitados").add({
          nombre:nombre,
          celular:celular,
          asistio:false
        });

        mostrarUsuario(nombre);

      });

    });

}

/* 👤 MOSTRAR USUARIO + QR = NOMBRE */
function mostrarUsuario(nombre){

  document.getElementById("registro").classList.add("hidden");
  document.getElementById("invitado").classList.remove("hidden");

  document.getElementById("qr").innerHTML="";

  new QRCode(document.getElementById("qr"),{
    text:nombre,
    width:220,
    height:220
  });

  document.getElementById("info").innerText = nombre;
}

/* 📋 PLANEACIÓN */
function agregarPlaneacion(){
  const n = norm(planNombre.value);
  if(!n)return;
  db.collection("planeacion").add({nombre:n});
  planNombre.value="";
}

/* 📋 LISTAS */
function cargar(){
  db.collection("planeacion").onSnapshot(s=>{
    listaPlan.innerHTML="";
    s.forEach(d=>{
      listaPlan.innerHTML += `<li>${d.data().nombre}</li>`;
    });
  });

  db.collection("invitados").onSnapshot(s=>{
    listaInvitados.innerHTML="";
    s.forEach(d=>{
      const x=d.data();
      listaInvitados.innerHTML += `<li>${x.nombre} | ${x.asistio?"✔":"❌"}</li>`;
    });
  });
}

/* 📷 ESCANER SIMPLE */
let lector;

function iniciarEscaner(){

  const cont = document.getElementById("reader");
  cont.innerHTML="";

  lector = new Html5Qrcode("reader");

  lector.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },

    (qr)=>{

      const nombre = norm(qr);

      db.collection("invitados")
        .where("nombre","==",nombre)
        .get()
        .then(res=>{

          if(res.empty){
            alert("No registrado");
            return;
          }

          res.forEach(doc=>{
            const d = doc.data();

            if(d.asistio){
              alert("Ya entró: " + d.nombre);
            }else{
              doc.ref.update({asistio:true});
              alert("Bienvenido " + d.nombre);
            }
          });

        });

      lector.stop();

    }

  );

}

window.onload = cargar;

</script>

</body>
</html>
