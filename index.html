<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#0a192f,#112240);
  color:#e0f2fe;
}
.container{max-width:500px;margin:auto;padding:20px;}
.card{
  background:#0f172a;
  border:1px solid #1e3a8a;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(37,99,235,0.2);
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}
input{
  background:#020617;
  color:#e0f2fe;
  border:1px solid #1e3a8a;
}
button{
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
  color:white;
  font-weight:bold;
}
button:hover{background:#1e40af;}
h2{margin:0 0 10px 0;text-align:center;}
.hidden{display:none;}
ul{list-style:none;padding:0;}
li{
  background:#020617;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #1e3a8a;
}
#reader{
  width:100%;
  border-radius:10px;
  overflow:hidden;
}
.success{color:#22c55e;}
.error{color:#ef4444;}
.warn{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<!-- REGISTRO -->
<div id="registro" class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<input id="celular" placeholder="Celular">
<input id="codigo" placeholder="Código admin (opcional)">
<button onclick="registrar()">Continuar</button>
<p id="msg"></p>
</div>

<!-- INVITADO -->
<div id="invitado" class="card hidden">
<h2>Tu QR</h2>
<div id="qr"></div>
<p>Haz captura de pantalla</p>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div class="card">
<h2>Agregar a Planeación</h2>
<input id="planNombre" placeholder="Nombre">
<button onclick="agregarPlaneacion()">Agregar</button>
</div>

<div class="card">
<h2>Planeación</h2>
<ul id="listaPlan"></ul>
</div>

<div class="card">
<h2>Registrados</h2>
<ul id="listaInvitados"></ul>
</div>

<div class="card">
<h2>Escanear QR</h2>
<button onclick="iniciarEscaner()">Abrir cámara</button>
<div id="reader"></div>
</div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWyE5VZXL5j4iFdOQoVRQ-2_DB0Eo3f6U",
  authDomain: "fiesta-qr-55d9a.firebaseapp.com",
  projectId: "fiesta-qr-55d9a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function registrar(){
  const nombreInput = nombre.value.trim().toLowerCase();
  const celularVal = celular.value;
  const codigoVal = codigo.value;

  if(!nombreInput || !celularVal){
    msg.innerText="Completa datos";
    msg.className="warn";
    return;
  }

  if(codigoVal==="142534"){
    registro.classList.add("hidden");
    admin.classList.remove("hidden");
    cargarPlaneacion();
    cargarInvitados();
    return;
  }

  const palabrasUsuario = nombreInput.split(" ");

  db.collection("planeacion").get().then(res=>{
    let autorizado=false;

    res.forEach(doc=>{
      const palabrasPlan = doc.data().nombre.toLowerCase().split(" ");
      palabrasPlan.forEach(p=>{
        if(palabrasUsuario.includes(p)){
          autorizado=true;
        }
      });
    });

    if(!autorizado){
      msg.innerText="No estás en lista";
      msg.className="error";
      return;
    }

    const qrCode = "QR-"+Math.random().toString(36).substr(2,8);

    db.collection("invitados").add({
      nombre:nombreInput,
      celular:celularVal,
      qr:qrCode,
      asistio:false
    });

    registro.classList.add("hidden");
    invitado.classList.remove("hidden");

    new QRCode(document.getElementById("qr"),{
      text:qrCode,
      width:160,
      height:160
    });

  });
}

function agregarPlaneacion(){
  const n = planNombre.value.trim().toLowerCase();
  if(!n)return;
  db.collection("planeacion").add({nombre:n});
  planNombre.value="";
}

function cargarPlaneacion(){
  db.collection("planeacion").onSnapshot(snap=>{
    listaPlan.innerHTML="";
    snap.forEach(doc=>{
      const li=document.createElement("li");
      li.innerText=doc.data().nombre;
      listaPlan.appendChild(li);
    });
  });
}

function cargarInvitados(){
  db.collection("invitados").onSnapshot(snap=>{
    listaInvitados.innerHTML="";
    snap.forEach(doc=>{
      const d=doc.data();
      const li=document.createElement("li");
      li.innerText=d.nombre+" | "+d.celular+" | "+(d.asistio?"✔":"❌");
      listaInvitados.appendChild(li);
    });
  });
}

function iniciarEscaner(){
  const qrReader = new Html5Qrcode("reader");

  qrReader.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    qr=>{
      qrReader.stop();
      marcarAsistencia(qr);
    }
  );
}

function marcarAsistencia(qr){
  db.collection("invitados")
  .where("qr","==",qr)
  .get()
  .then(res=>{
    if(res.empty){
      alert("QR inválido");
      return;
    }

    res.forEach(doc=>{
      const d=doc.data();

      if(d.asistio){
        alert("Ya ingresó");
      }else{
        doc.ref.update({asistio:true});
        alert("Bienvenido "+d.nombre);
      }
    });
  });
}
</script>
<script>
/* 🔐 LOGIN / REINGRESO usando la MISMA pantalla */

(function(){

  const originalRegistrar = registrar;

  registrar = function(){

    const nombreInput = document.getElementById("nombre").value.trim().toLowerCase();
    const celularVal = document.getElementById("celular").value.trim();
    const codigoVal = document.getElementById("codigo").value;

    if(!nombreInput || !celularVal){
      msg.innerText="Completa datos";
      msg.className="warn";
      return;
    }

    // ADMIN directo (también persiste)
    if(codigoVal==="142534"){
      localStorage.setItem("admin","true");
      document.getElementById("registro").classList.add("hidden");
      document.getElementById("admin").classList.remove("hidden");
      if(typeof cargarPlaneacion==="function") cargarPlaneacion();
      if(typeof cargarInvitados==="function") cargarInvitados();
      return;
    }

    // 🔎 Buscar si YA existe (login)
    db.collection("invitados")
      .where("celular","==",celularVal)
      .get()
      .then(res=>{

        if(!res.empty){
          // LOGIN existente
          const doc = res.docs[0];
          const d = doc.data();

          document.getElementById("registro").classList.add("hidden");
          document.getElementById("invitado").classList.remove("hidden");

          const cont = document.getElementById("qr");
          cont.innerHTML = "";

          new QRCode(cont,{
            text:d.qr,
            width:160,
            height:160
          });

          msg.innerText="Sesión recuperada";
          msg.className="success";
          return;
        }

        // 🆕 SI NO EXISTE → registrar normal (valida contra planeación)
        const palabrasUsuario = nombreInput.split(" ");

        db.collection("planeacion").get().then(resPlan=>{
          let autorizado=false;

          resPlan.forEach(doc=>{
            const palabrasPlan = doc.data().nombre.toLowerCase().split(" ");
            palabrasPlan.forEach(p=>{
              if(palabrasUsuario.includes(p)){
                autorizado=true;
              }
            });
          });

          if(!autorizado){
            msg.innerText="No estás en lista";
            msg.className="error";
            return;
          }

          const qrCode = "QR-"+Math.random().toString(36).substr(2,8);

          db.collection("invitados").add({
            nombre:nombreInput,
            celular:celularVal,
            qr:qrCode,
            asistio:false
          });

          document.getElementById("registro").classList.add("hidden");
          document.getElementById("invitado").classList.remove("hidden");

          const cont = document.getElementById("qr");
          cont.innerHTML = "";

          new QRCode(cont,{
            text:qrCode,
            width:160,
            height:160
          });

          msg.innerText="Registro exitoso";
          msg.className="success";
        });

      });

  };

  // 🔁 Auto-login admin si ya había entrado
  window.addEventListener("load", ()=>{
    if(localStorage.getItem("admin")==="true"){
      document.getElementById("registro").classList.add("hidden");
      document.getElementById("admin").classList.remove("hidden");
      if(typeof cargarPlaneacion==="function") cargarPlaneacion();
      if(typeof cargarInvitados==="function") cargarInvitados();
    }
  });

})();
</script>
</body>
</html>

</body>
