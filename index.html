<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Roboto:wght@400;500&amp;display=swap">

<style>
body{
  margin:0;
  font-family:'Roboto', sans-serif;
  background:linear-gradient(135deg,#1a1a1a,#2a2a2a,#1a1a1a);
  color:#e5d8b0;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1f1f1f;
  border:2px solid #555555;
  padding:25px;
  border-radius:18px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6), 
             0 0 25px rgba(255,215,0,0.18);
}

h2{
  text-align:center;
  margin-bottom:15px;
  font-family:'Playfair Display', serif;
  color:#ffd700;
  text-shadow:0 0 12px rgba(255,215,0,0.7);
  letter-spacing:1px;
}

input,button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border-radius:10px;
  font-size:15px;
  transition:0.2s;
}

input{
  background:#111111;
  color:#e5d8b0;
  border:2px solid #777777;
  font-family:'Roboto', sans-serif;
}

input:focus{
  border-color:#ffd700;
  box-shadow:0 0 12px rgba(255,215,0,0.4);
  outline:none;
}

button{
  background:linear-gradient(90deg,#b8860b,#e5b800);
  color:#111111;
  border:none;
  font-weight:600;
  cursor:pointer;
  font-family:'Roboto', sans-serif;
  box-shadow:0 4px 12px rgba(255,215,0,0.3);
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,215,0,0.7);
}

.hidden{display:none;}

ul{list-style:none;padding:0;}

li{
  background:#111111;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #555555;
  color:#e5d8b0;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}

#qr{
  display:flex;
  justify-content:center;
  margin-top:15px;
  padding:15px;
  background:#222222;
  border-radius:12px;
  box-shadow:0 0 15px rgba(255,215,0,0.25);
}

#reader{
  width:100%;
  border-radius:12px;
  overflow:hidden;
  border:3px solid #ffd700;
  box-shadow:0 0 20px rgba(255,215,0,0.4);
  background:#000;
}

.success{color:#90ee90;}
.error{color:#ff6666;}
.warn{color:#ffcc66;}

.status{
  text-align:center;
  margin-top:8px;
  padding:8px;
  border-radius:8px;
  font-weight:500;
}
</style>
</head>

<body>

<div class="container">

<div id="registro" class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<input id="celular" placeholder="Celular">
<input id="codigo" placeholder="Código admin (opcional)">
<button onclick="registrar()">Continuar</button>
<p id="msg" class="status"></p>
</div>

<div id="invitado" class="card hidden">
<h2>Tu QR</h2>
<div id="qr"></div>
<p style="text-align:center; color:#ffd700; margin-top:10px; font-family:'Playfair Display', serif;">Haz captura de pantalla</p>
</div>

<div id="admin" class="hidden">

<div class="card">
<h2>Agregar a Planeación</h2>
<input id="planNombre" placeholder="Nombre">
<button onclick="agregarPlaneacion()">Agregar</button>
</div>

<div class="card">
<h2>Planeación</h2>
<ul id="listaPlan"></ul>
</div>

<div class="card">
<h2>Registrados</h2>
<ul id="listaInvitados"></ul>
</div>

<div class="card">
<h2>Escanear QR</h2>
<div style="display:flex; gap:10px; margin-bottom:15px;">
<button onclick="iniciarEscaner()" style="flex:1;">Abrir cámara</button>
<button onclick="detenerEscaner()" style="flex:1; background:#333333; color:#ffd700;">Detener cámara</button>
</div>
<div id="reader"></div>
<p id="scanMsg" class="status"></p>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWyE5VZXL5j4iFdOQoVRQ-2_DB0Eo3f6U",
  authDomain: "fiesta-qr-55d9a.firebaseapp.com",
  projectId: "fiesta-qr-55d9a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* REGISTRO */
async function registrar(){

  const nombreInput = nombre.value.trim().toLowerCase();
  const celularVal = celular.value.trim();
  const codigoVal = codigo.value;

  if(!nombreInput || !celularVal){
    msg.innerText="Completa datos";
    msg.className="warn";
    return;
  }

  if(codigoVal==="142534"){
    localStorage.setItem("admin","true");
    registro.classList.add("hidden");
    admin.classList.remove("hidden");
    cargarPlaneacion();
    cargarInvitados();
    return;
  }

  const res = await db.collection("invitados")
    .where("celular","==",celularVal)
    .get();

  if(!res.empty){
    const d = res.docs[0].data();
    mostrarQR(d.qr);
    msg.innerText="Sesión recuperada";
    msg.className="success";
    return;
  }

  const palabrasUsuario = nombreInput.split(" ");
  const resPlan = await db.collection("planeacion").get();

  let autorizado=false;

  resPlan.forEach(doc=>{
    const palabrasPlan = doc.data().nombre.toLowerCase().split(" ");
    palabrasPlan.forEach(p=>{
      if(palabrasUsuario.includes(p)) autorizado=true;
    });
  });

  if(!autorizado){
    msg.innerText="No estás en lista";
    msg.className="error";
    return;
  }

  const qrCode = "QR-"+Date.now()+"-"+Math.random().toString(36).substring(2,10);

  await db.collection("invitados").add({
    nombre:nombreInput,
    celular:celularVal,
    qr:qrCode,
    asistio:false
  });

  mostrarQR(qrCode);
  msg.innerText="Registro exitoso";
  msg.className="success";
}

/* MOSTRAR QR */
function mostrarQR(texto){
  registro.classList.add("hidden");
  invitado.classList.remove("hidden");

  const cont = document.getElementById("qr");
  cont.innerHTML="";

  new QRCode(cont,{
    text:texto,
    width:260,
    height:260,
    colorDark:"#111111",
    colorLight:"#ffffff",
    correctLevel:QRCode.CorrectLevel.H
  });
}

/* ADMIN */
function agregarPlaneacion(){
  const n = planNombre.value.trim().toLowerCase();
  if(!n)return;
  db.collection("planeacion").add({nombre:n});
  planNombre.value="";
}

function cargarPlaneacion(){
  db.collection("planeacion").onSnapshot(snap=>{
    listaPlan.innerHTML="";
    snap.forEach(doc=>{
      const li=document.createElement("li");
      li.innerText=doc.data().nombre;
      listaPlan.appendChild(li);
    });
  });
}

function cargarInvitados(){
  db.collection("invitados").onSnapshot(snap=>{
    listaInvitados.innerHTML="";
    snap.forEach(doc=>{
      const d=doc.data();
      const li=document.createElement("li");
      li.innerText=d.nombre+" | "+d.celular+" | "+(d.asistio?"✔":"❌");
      listaInvitados.appendChild(li);
    });
  });
}

/* ESCÁNER PRO */
let lector=null;

function iniciarEscaner(){

  const cont=document.getElementById("reader");
  cont.innerHTML="";

  if(lector){
    try{lector.stop();}catch(e){}
  }

  lector=new Html5Qrcode("reader");

  lector.start(
    {facingMode:"environment"},
    {
      fps:15,
      qrbox:{width:280,height:280}
    },

    async(qrText)=>{

      // Se mantiene el escáner activo para el siguiente invitado
      const scanMsg = document.getElementById("scanMsg");
      
      const res=await db.collection("invitados")
        .where("qr","==",qrText)
        .get();

      if(res.empty){
        scanMsg.innerHTML="❌ QR inválido";
        scanMsg.className="error status";
        setTimeout(()=>{scanMsg.innerHTML="";},2500);
        return;
      }

      res.forEach(async(doc)=>{
        const d=doc.data();

        if(d.asistio){
          scanMsg.innerHTML=`⚠️ Ya ingresó: ${d.nombre}`;
          scanMsg.className="warn status";
          setTimeout(()=>{scanMsg.innerHTML="";},3000);
        }else{
          await doc.ref.update({asistio:true});
          scanMsg.innerHTML=`✅ Bienvenido ${d.nombre}`;
          scanMsg.className="success status";
          setTimeout(()=>{scanMsg.innerHTML="";},3000);
        }
      });

    }
  ).catch(err=>{
    const scanMsg = document.getElementById("scanMsg");
    scanMsg.innerHTML="Error cámara: "+err;
    scanMsg.className="error status";
  });
}

function detenerEscaner(){
  if(lector){
    try{
      lector.stop();
      lector=null;
    }catch(e){}
    const cont=document.getElementById("reader");
    cont.innerHTML="";
    const scanMsg = document.getElementById("scanMsg");
    scanMsg.innerHTML="";
  }
}

/* AUTO ADMIN */
window.addEventListener("load",()=>{
  if(localStorage.getItem("admin")==="true"){
    registro.classList.add("hidden");
    admin.classList.remove("hidden");
    cargarPlaneacion();
    cargarInvitados();
  }
});
</script>

</body>
</html>
