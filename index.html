<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');

    :root {
        --ios-blue: #0a84ff;
        --glass-bg: rgba(30, 41, 59, 0.68);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e2937, #0f172a);
        color: #f1f5f9;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 20%, rgba(10, 132, 255, 0.28) 0%, transparent 55%),
                    radial-gradient(circle at 70% 85%, rgba(10, 132, 255, 0.25) 0%, transparent 60%);
        filter: blur(100px);
        z-index: -1;
        pointer-events: none;
        animation: iosGlow 18s ease infinite;
    }

    @keyframes iosGlow {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; }
    }

    .container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
    }

    .card {
        background: var(--glass-bg);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 28px;
        padding: 28px 24px;
        margin-bottom: 24px;
        box-shadow: 
            0 12px 40px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255,255,255,0.1) inset,
            0 0 30px rgba(10, 132, 255, 0.22);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
    }

    h2 {
        text-align: center;
        font-size: 1.7rem;
        font-weight: 600;
        letter-spacing: -0.8px;
        color: #f1f5f9;
        margin-bottom: 26px;
        text-shadow: 0 0 22px rgba(10, 132, 255, 0.5);
    }

    input {
        width: 100%;
        background: rgba(15, 23, 42, 0.75);
        border: 1.5px solid rgba(148, 163, 184, 0.3);
        border-radius: 18px;
        padding: 16px 20px;
        font-size: 17px;
        color: #f1f5f9;
        margin-bottom: 14px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:focus {
        border-color: var(--ios-blue);
        box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.3);
        outline: none;
    }

    button {
        width: 100%;
        border: none;
        border-radius: 18px;
        padding: 16px 20px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 8px;
    }

    /* iOS glass buttons */
    .btn-primary {
        background: linear-gradient(90deg, #0a84ff, #3b9eff);
        color: white;
        box-shadow: 0 8px 22px rgba(10, 132, 255, 0.45);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(10, 132, 255, 0.6); }

    .btn-secondary {
        background: rgba(15, 23, 42, 0.85);
        color: #f1f5f9;
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    }

    .hidden { display: none !important; }

    ul { list-style: none; padding: 0; margin: 0; }

    li {
        background: rgba(15, 23, 42, 0.75);
        padding: 16px 20px;
        margin-bottom: 12px;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        font-size: 16px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(14px);
    }

    #qr {
        display: flex;
        justify-content: center;
        padding: 26px;
        background: rgba(15, 23, 42, 0.85);
        border-radius: 26px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        margin-top: 12px;
        box-shadow: 0 0 32px rgba(10, 132, 255, 0.3);
        backdrop-filter: blur(18px);
    }

    /* READER - iOS glass + exact look from your screenshot */
    #reader {
        width: 100%;
        min-height: 380px;
        border-radius: 28px;
        overflow: hidden;
        border: 5px solid rgba(10, 132, 255, 0.65);
        box-shadow: 
            0 0 40px rgba(10, 132, 255, 0.55),
            0 0 0 1px rgba(255,255,255,0.15) inset;
        background: #0f172a;
        position: relative;
        backdrop-filter: blur(12px);
    }

    #reader::after {
        content: "Apunta el QR al centro";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(241, 245, 249, 0.85);
        font-size: 15px;
        font-weight: 500;
        text-align: center;
        width: 100%;
        z-index: 10;
        text-shadow: 0 0 18px rgba(10, 132, 255, 0.9);
        pointer-events: none;
    }

    /* Scanner corners - iOS style */
    #reader::before {
        content: "";
        position: absolute;
        top: 38px;
        left: 38px;
        width: 52px;
        height: 52px;
        border-top: 6px solid var(--ios-blue);
        border-left: 6px solid var(--ios-blue);
        border-radius: 12px;
        z-index: 20;
        box-shadow: 0 0 18px rgba(10, 132, 255, 0.8);
    }
    #reader::after {
        content: "";
        position: absolute;
        top: 38px;
        right: 38px;
        width: 52px;
        height: 52px;
        border-top: 6px solid var(--ios-blue);
        border-right: 6px solid var(--ios-blue);
        border-radius: 12px;
        z-index: 20;
        box-shadow: 0 0 18px rgba(10, 132, 255, 0.8);
    }
    #reader .bottom-left::before, #reader .bottom-right::before {
        content: "";
        position: absolute;
        bottom: 38px;
        left: 38px;
        width: 52px;
        height: 52px;
        border-bottom: 6px solid var(--ios-blue);
        border-left: 6px solid var(--ios-blue);
        border-radius: 12px;
        z-index: 20;
        box-shadow: 0 0 18px rgba(10, 132, 255, 0.8);
    }
    #reader .bottom-right::before {
        left: auto;
        right: 38px;
        border-right: 6px solid var(--ios-blue);
        border-bottom: 6px solid var(--ios-blue);
    }

    .status {
        text-align: center;
        margin-top: 16px;
        padding: 14px 20px;
        border-radius: 18px;
        font-size: 16px;
        font-weight: 500;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .warn { color: #fbbf24; }

    /* CONFIRMATION PANEL - iOS notification style */
    #scanResult {
        position: fixed;
        bottom: 24px;
        left: 20px;
        right: 20px;
        background: rgba(30, 41, 59, 0.95);
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6),
                    0 0 0 1px rgba(255,255,255,0.12) inset;
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        padding: 28px 24px;
        z-index: 99999;
        max-width: 460px;
        margin: 0 auto;
        animation: iosSlideUp 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }

    @keyframes iosSlideUp {
        from { transform: translateY(120px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .qr-detected {
        background: rgba(15, 23, 42, 0.9);
        padding: 18px;
        border-radius: 18px;
        font-size: 17px;
        word-break: break-all;
        margin-bottom: 22px;
        border: 1px solid rgba(10, 132, 255, 0.4);
        font-weight: 500;
    }
</style>
</head>

<body>

<div class="container">

    <!-- REGISTRO -->
    <div id="registro" class="card">
        <h2>Registro</h2>
        <input id="nombre" placeholder="Nombre completo" autocomplete="off">
        <input id="celular" placeholder="Celular" type="tel" autocomplete="off">
        <input id="codigo" placeholder="Código admin (opcional)" autocomplete="off">
        <button onclick="registrar()" class="btn-primary">Continuar</button>
        <p id="msg" class="status"></p>
    </div>

    <!-- INVITADO QR -->
    <div id="invitado" class="card hidden">
        <h2>Tu código QR</h2>
        <div id="qr"></div>
        <p style="text-align:center; margin-top:18px; font-size:15px; color:#94a3b8;">Mantén presionado para guardar imagen</p>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="hidden">

        <div class="card">
            <h2>Agregar a Planeación</h2>
            <input id="planNombre" placeholder="Nombre">
            <button onclick="agregarPlaneacion()" class="btn-primary">Agregar</button>
        </div>

        <div class="card">
            <h2>Planeación</h2>
            <ul id="listaPlan"></ul>
        </div>

        <div class="card">
            <h2>Registrados</h2>
            <ul id="listaInvitados"></ul>
        </div>

        <!-- ESCANEAR QR - EXACTO como tu captura -->
        <div class="card">
            <h2>Escanear QR</h2>
            
            <div style="display:flex; gap:14px; margin-bottom:22px;">
                <button onclick="iniciarEscaner()" class="btn-primary" style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px;">
                    📸 Abrir cámara
                </button>
                <button onclick="detenerEscaner()" class="btn-secondary" style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px;">
                    ⏹ Detener
                </button>
            </div>

            <div id="reader"></div>
            <p id="scanMsg" class="status">Cámara lista • Apunta al QR</p>
        </div>

    </div>

</div>

<!-- PANEL DE CONFIRMACIÓN CON BOTÓN (exacto como pediste) -->
<div id="scanResult" class="hidden">
    <div style="font-size:18px; font-weight:600; margin-bottom:12px; text-align:center;">QR detectado</div>
    <div id="qrDetectedText" class="qr-detected"></div>
    
    <button onclick="procesarEscaneo()" class="btn-primary" style="margin-bottom:14px;">✅ Marcar como asistió</button>
    <button onclick="cancelarEscaneo()" class="btn-secondary">Cancelar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWyE5VZXL5j4iFdOQoVRQ-2_DB0Eo3f6U",
        authDomain: "fiesta-qr-55d9a.firebaseapp.com",
        projectId: "fiesta-qr-55d9a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lector = null;
    let currentQrText = null;

    /* REGISTRO - QR = nombre completo (minúsculas) */
    async function registrar() {
        const nombreInput = document.getElementById('nombre').value.trim().toLowerCase();
        const celularVal = document.getElementById('celular').value.trim();
        const codigoVal = document.getElementById('codigo').value.trim();
        const msg = document.getElementById('msg');

        if (!nombreInput || !celularVal) {
            msg.innerHTML = 'Completa todos los datos';
            msg.className = 'status error';
            return;
        }

        if (codigoVal === "142534") {
            localStorage.setItem("admin", "true");
            document.getElementById('registro').classList.add('hidden');
            document.getElementById('admin').classList.remove('hidden');
            cargarPlaneacion();
            cargarInvitados();
            return;
        }

        const res = await db.collection("invitados").where("celular", "==", celularVal).get();
        if (!res.empty) {
            const d = res.docs[0].data();
            mostrarQR(d.qr);
            msg.innerHTML = 'Sesión recuperada';
            msg.className = 'status success';
            return;
        }

        const palabrasUsuario = nombreInput.split(" ");
        const resPlan = await db.collection("planeacion").get();
        let autorizado = false;
        resPlan.forEach(doc => {
            const palabrasPlan = doc.data().nombre.toLowerCase().split(" ");
            palabrasPlan.forEach(p => { if (palabrasUsuario.includes(p)) autorizado = true; });
        });

        if (!autorizado) {
            msg.innerHTML = 'No estás en la lista de planeación';
            msg.className = 'status error';
            return;
        }

        const qrCode = nombreInput;   // ← QR es el nombre (como pediste)

        await db.collection("invitados").add({
            nombre: nombreInput,
            celular: celularVal,
            qr: qrCode,
            asistio: false
        });

        mostrarQR(qrCode);
        msg.innerHTML = 'Registro exitoso';
        msg.className = 'status success';
    }

    function mostrarQR(texto) {
        document.getElementById('registro').classList.add('hidden');
        const invitadoCard = document.getElementById('invitado');
        invitadoCard.classList.remove('hidden');
        const cont = document.getElementById('qr');
        cont.innerHTML = "";
        new QRCode(cont, {
            text: texto,
            width: 280,
            height: 280,
            colorDark: "#0f172a",
            colorLight: "#f1f5f9",
            correctLevel: QRCode.CorrectLevel.H
        });
    }

    function agregarPlaneacion() {
        const n = document.getElementById('planNombre').value.trim().toLowerCase();
        if (!n) return;
        db.collection("planeacion").add({ nombre: n });
        document.getElementById('planNombre').value = "";
    }

    function cargarPlaneacion() {
        db.collection("planeacion").onSnapshot(snap => {
            const lista = document.getElementById('listaPlan');
            lista.innerHTML = "";
            snap.forEach(doc => {
                const li = document.createElement('li');
                li.innerText = doc.data().nombre;
                lista.appendChild(li);
            });
        });
    }

    function cargarInvitados() {
        db.collection("invitados").onSnapshot(snap => {
            const lista = document.getElementById('listaInvitados');
            lista.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const li = document.createElement('li');
                li.innerText = `${d.nombre} | ${d.celular} | ${d.asistio ? '✔' : '❌'}`;
                lista.appendChild(li);
            });
        });
    }

    /* ESCANER - Cámara se queda abierta + botón para confirmar (como pediste) */
    async function iniciarEscaner() {
        const reader = document.getElementById('reader');
        const scanMsg = document.getElementById('scanMsg');
        
        reader.innerHTML = "";
        scanMsg.innerHTML = "Iniciando cámara…";
        scanMsg.className = "status";

        if (lector) { try { await lector.stop(); } catch(e){} lector = null; }

        lector = new Html5Qrcode("reader");

        try {
            await lector.start(
                { facingMode: "environment" },
                { 
                    fps: 25, 
                    qrbox: { width: 300, height: 300 },
                    aspectRatio: 1.0
                },
                (qrText) => {
                    console.log("✅ QR DETECTADO:", qrText);
                    currentQrText = qrText;
                    lector.stop().catch(() => {});
                    mostrarPanelConfirmacion(qrText);
                },
                () => {}   // no QR = silencio
            );

            scanMsg.innerHTML = "📸 Cámara lista • Apunta al QR";
            scanMsg.className = "status";

        } catch (err) {
            console.error(err);
            scanMsg.innerHTML = `❌ Error cámara:<br>${err.message}<br><small>Permiso denegado o sin HTTPS</small>`;
            scanMsg.className = "status error";
        }
    }

    function mostrarPanelConfirmacion(qrText) {
        const panel = document.getElementById('scanResult');
        document.getElementById('qrDetectedText').innerHTML = `<strong>Nombre detectado:</strong><br>${qrText}`;
        panel.classList.remove('hidden');
    }

    /* BOTÓN QUE REALMENTE ENVÍA LA SOLICITUD A FIREBASE */
    async function procesarEscaneo() {
        const panel = document.getElementById('scanResult');
        const scanMsg = document.getElementById('scanMsg');
        panel.classList.add('hidden');

        if (!currentQrText) return;

        scanMsg.innerHTML = "Buscando en Firebase…";
        scanMsg.className = "status";

        try {
            const res = await db.collection("invitados")
                .where("nombre", "==", currentQrText)
                .get();

            if (res.empty) {
                scanMsg.innerHTML = "❌ Ese nombre no existe";
                scanMsg.className = "status error";
                setTimeout(() => iniciarEscaner(), 2200);
                return;
            }

            const docSnap = res.docs[0];
            const data = docSnap.data();

            if (data.asistio === true) {
                scanMsg.innerHTML = `⚠️ Ya había ingresado: ${data.nombre}`;
                scanMsg.className = "status warn";
            } else {
                await docSnap.ref.update({ asistio: true });
                console.log("✅ FIREBASE ACTUALIZADO - asistio: true");
                scanMsg.innerHTML = `✅ Asistencia marcada<br><strong>${data.nombre}</strong>`;
                scanMsg.className = "status success";
            }

            setTimeout(() => iniciarEscaner(), 2800);

        } catch (err) {
            console.error(err);
            scanMsg.innerHTML = `❌ Error Firebase:<br>${err.message}`;
            scanMsg.className = "status error";
            setTimeout(() => iniciarEscaner(), 3000);
        }
    }

    function cancelarEscaneo() {
        document.getElementById('scanResult').classList.add('hidden');
        iniciarEscaner();
    }

    function detenerEscaner() {
        if (lector) { try { lector.stop(); } catch(e){} lector = null; }
        document.getElementById('reader').innerHTML = "";
        document.getElementById('scanMsg').innerHTML = "Cámara detenida";
        document.getElementById('scanResult').classList.add('hidden');
    }

    window.addEventListener("load", () => {
        if (localStorage.getItem("admin") === "true") {
            document.getElementById('registro').classList.add('hidden');
            document.getElementById('admin').classList.remove('hidden');
            cargarPlaneacion();
            cargarInvitados();
        }
    });
</script>

</body>
</html>
