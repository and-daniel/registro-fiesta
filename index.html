<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');

    :root {
        --ios-blue: #0a84ff;
        --glass: rgba(20, 25, 40, 0.78);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: linear-gradient(135deg, #0a1428, #1a2338, #0a1428);
        color: #f1f5f9;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 20%, rgba(10, 132, 255, 0.32) 0%, transparent 55%),
                    radial-gradient(circle at 75% 80%, rgba(10, 132, 255, 0.28) 0%, transparent 60%);
        filter: blur(100px);
        z-index: -1;
        pointer-events: none;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 20px; }

    .card {
        background: var(--glass);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 26px;
        padding: 26px 22px;
        margin-bottom: 24px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.45),
                    0 0 0 1px rgba(255,255,255,0.09) inset;
        backdrop-filter: blur(40px);
    }

    h2 {
        text-align: center;
        font-size: 1.75rem;
        font-weight: 600;
        margin-bottom: 24px;
    }

    input {
        width: 100%;
        background: rgba(15, 23, 42, 0.85);
        border: 1.5px solid rgba(148, 163, 184, 0.3);
        border-radius: 18px;
        padding: 16px 20px;
        font-size: 17px;
        color: #f1f5f9;
        margin-bottom: 14px;
    }

    input:focus {
        border-color: #0a84ff;
        outline: none;
    }

    button {
        width: 100%;
        border: none;
        border-radius: 18px;
        padding: 16px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        background: linear-gradient(90deg, #0a84ff, #3b9eff);
        color: white;
    }

    .hidden { display: none; }

    #reader {
        width: 100%;
        min-height: 380px;
        border-radius: 26px;
        overflow: hidden;
        border: 6px solid #0a84ff;
        background: #0a1428;
    }

    .status {
        text-align: center;
        margin-top: 16px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(15,23,42,0.8);
    }

    .success { color:#22c55e; }
    .error { color:#ef4444; }
    .warn { color:#fbbf24; }
</style>
</head>

<body>

<div class="container">

<!-- REGISTRO -->
<div id="registro" class="card">
    <h2>Registro</h2>
    <input id="nombre" placeholder="Nombre completo">
    <input id="celular" placeholder="Celular">
    <input id="codigo" placeholder="Código admin (opcional)">
    <button onclick="registrar()">Continuar</button>
    <p id="msg" class="status"></p>
</div>

<!-- INVITADO -->
<div id="invitado" class="card hidden">
    <h2>Tu QR</h2>
    <div id="qr"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div class="card">
<h2>Planeación</h2>
<input id="planNombre" placeholder="Nombre">
<button onclick="agregarPlaneacion()">Agregar</button>
</div>

<div class="card">
<h2>Escáner</h2>
<button onclick="iniciarEscaner()">Abrir cámara</button>
<div id="reader"></div>
<p id="scanMsg" class="status">Listo</p>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAWyE...",
  authDomain: "fiesta-qr-55d9a.firebaseapp.com",
  projectId: "fiesta-qr-55d9a"
});

const db = firebase.firestore();
let lector = null;

/* NORMALIZAR */
const norm = t => (t || "").trim().toLowerCase();

/* ================= REGISTRO ================= */
async function registrar(){

  const nombre = norm(document.getElementById("nombre").value);
  const celular = document.getElementById("celular").value;
  const msg = document.getElementById("msg");

  if(!nombre || !celular){
    msg.innerText="Completa datos";
    return;
  }

  const plan = await db.collection("planeacion").get();
  let ok = false;

  plan.forEach(d=>{
    if(norm(d.data().nombre) === nombre) ok = true;
  });

  if(!ok){
    msg.innerText="No estás en lista";
    return;
  }

  await db.collection("invitados").add({
    nombre,
    celular,
    qr: nombre,
    asistio:false
  });

  mostrarQR(nombre);
}

/* QR */
function mostrarQR(texto){
  registro.classList.add("hidden");
  invitado.classList.remove("hidden");

  document.getElementById("qr").innerHTML="";

  new QRCode(document.getElementById("qr"),{
    text:texto,
    width:260,
    height:260
  });
}

/* ================= ESCÁNER (FIX REAL) ================= */
async function iniciarEscaner(){

  const msg = document.getElementById("scanMsg");

  if(lector){
    try{await lector.stop();}catch(e){}
  }

  lector = new Html5Qrcode("reader");

  try{

    await lector.start(
      { facingMode:"environment" },
      { fps:15, qrbox:250 },

      async(qrText)=>{

        const nombre = norm(qrText);

        try{ await lector.stop(); }catch(e){}

        const res = await db.collection("invitados")
          .where("qr","==",nombre)
          .get();

        if(res.empty){
          msg.innerText="No encontrado";
          return;
        }

        const doc = res.docs[0];
        const d = doc.data();

        if(d.asistio){
          msg.innerText="Ya ingresó " + d.nombre;
        }else{
          await doc.ref.update({asistio:true});
          msg.innerText="Bienvenido " + d.nombre;
        }

      }

    );

  }catch(e){
    msg.innerText="Error cámara";
  }

}

</script>

</body>
</html>
