<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Evento</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
    --bg-1:#050816;
    --bg-2:#081120;
    --bg-3:#101c33;
    --card:rgba(15, 23, 42, 0.72);
    --card-2:rgba(8, 14, 28, 0.88);
    --line:rgba(148, 163, 184, 0.18);
    --line-strong:rgba(10, 132, 255, 0.38);
    --text:#eef4ff;
    --muted:#9fb0cb;
    --blue:#0a84ff;
    --blue-2:#3b9eff;
    --cyan:#2dd4ff;
    --shadow:0 20px 60px rgba(0,0,0,.42);
    --glow:0 0 0 1px rgba(255,255,255,.07) inset, 0 0 35px rgba(10,132,255,.22);
    --radius:28px;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{min-height:100%}

body{
    font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at 15% 20%, rgba(10,132,255,.22) 0%, transparent 25%),
        radial-gradient(circle at 85% 15%, rgba(45,212,255,.14) 0%, transparent 20%),
        radial-gradient(circle at 75% 80%, rgba(10,132,255,.16) 0%, transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
    overflow-x:hidden;
}

body::before,
body::after{
    content:"";
    position:fixed;
    inset:auto;
    pointer-events:none;
    z-index:-1;
    filter:blur(90px);
}

body::before{
    width:420px;height:420px;
    left:-130px;top:120px;
    background:rgba(10,132,255,.22);
}
body::after{
    width:360px;height:360px;
    right:-120px;bottom:70px;
    background:rgba(45,212,255,.12);
}

a{color:inherit;text-decoration:none}

.container{
    width:min(1180px, calc(100% - 28px));
    margin:0 auto;
    padding:22px 0 40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.brand-mark{
    width:44px;height:44px;
    border-radius:16px;
    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), rgba(255,255,255,0) 22%),
        linear-gradient(145deg, rgba(10,132,255,1), rgba(59,158,255,.55));
    box-shadow:0 10px 26px rgba(10,132,255,.35);
    position:relative;
    overflow:hidden;
}
.brand-mark::after{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:12px;
    background:linear-gradient(145deg, rgba(255,255,255,.2), rgba(255,255,255,0));
    transform:rotate(12deg);
}

.brand-text h1{
    font-size:1.06rem;
    font-weight:800;
    letter-spacing:.2px;
    line-height:1.1;
}
.brand-text p{
    font-size:.88rem;
    color:var(--muted);
    margin-top:2px;
}

.badges{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
}

.chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:rgba(9, 15, 29, .68);
    border:1px solid rgba(148,163,184,.18);
    box-shadow:var(--glow);
    font-size:.88rem;
    color:#dce7fb;
    backdrop-filter:blur(18px);
}

.chip-dot{
    width:8px;height:8px;border-radius:999px;background:var(--cyan);
    box-shadow:0 0 18px var(--cyan);
}

.screen{
    display:none;
    animation:fadeIn .32s ease-out;
}

.screen.active{
    display:block;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(12px)}
    to{opacity:1;transform:translateY(0)}
}

.hero{
    display:grid;
    grid-template-columns:1.05fr .95fr;
    gap:18px;
    margin-bottom:18px;
}

.card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow), var(--glow);
    backdrop-filter:blur(26px);
    -webkit-backdrop-filter:blur(26px);
    overflow:hidden;
    position:relative;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 20%),
        radial-gradient(circle at top right, rgba(10,132,255,.12), transparent 35%);
    pointer-events:none;
}

.hero-copy{
    padding:30px 28px 28px;
    min-height:360px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:24px;
}

.hero-kicker{
    display:inline-flex;
    align-items:center;
    gap:10px;
    color:#dfeaff;
    font-size:.9rem;
    font-weight:600;
    letter-spacing:.24px;
    text-transform:uppercase;
}

.hero-kicker::before{
    content:"";
    width:38px;
    height:2px;
    border-radius:999px;
    background:linear-gradient(90deg, var(--blue), rgba(10,132,255,0));
    box-shadow:0 0 22px rgba(10,132,255,.7);
}

.hero-title{
    font-size:clamp(2.35rem, 5vw, 5.2rem);
    line-height:.92;
    letter-spacing:-2px;
    font-weight:800;
    margin-top:10px;
}

.hero-title span{
    display:block;
}

.hero-sub{
    max-width:540px;
    color:#c9d8ef;
    font-size:1rem;
    line-height:1.75;
    margin-top:16px;
}

.hero-actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:10px;
}

.pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:rgba(7,12,24,.55);
    border:1px solid rgba(148,163,184,.16);
    color:#dfeaff;
    font-size:.9rem;
}

.pill i{
    width:8px;height:8px;border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 18px rgba(10,132,255,.8);
    display:inline-block;
}

.visual{
    min-height:360px;
    padding:20px;
}

.visual-grid{
    height:100%;
    display:grid;
    grid-template-columns:1.2fr .8fr;
    grid-template-rows:1fr 1fr;
    gap:12px;
    min-height:320px;
}

.art{
    border-radius:24px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 16px 40px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.04) inset;
    isolation:isolate;
}

.art::before,
.art::after{
    content:"";
    position:absolute;
    inset:auto;
    border-radius:999px;
    pointer-events:none;
}

.art::before{
    width:220px;height:220px;
    right:-55px;top:-70px;
    background:radial-gradient(circle, rgba(255,255,255,.18), rgba(255,255,255,0) 58%);
    filter:blur(10px);
}

.art::after{
    width:180px;height:180px;
    left:-50px;bottom:-70px;
    background:radial-gradient(circle, rgba(10,132,255,.35), rgba(10,132,255,0) 58%);
    filter:blur(18px);
}

.art-main{
    grid-row:1 / span 2;
    background:
        radial-gradient(circle at 26% 28%, rgba(45,212,255,.85), transparent 14%),
        radial-gradient(circle at 78% 24%, rgba(10,132,255,.70), transparent 15%),
        radial-gradient(circle at 65% 70%, rgba(59,158,255,.38), transparent 17%),
        linear-gradient(145deg, #040814 8%, #081428 38%, #0f2748 100%);
}

.art-main .shape{
    position:absolute;
    border-radius:999px;
    background:linear-gradient(145deg, rgba(255,255,255,.85), rgba(255,255,255,0));
    filter:blur(0);
    opacity:.9;
}

.art-main .shape.one{
    width:210px;height:210px;
    left:-20px;bottom:-55px;
    background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.9) 0%, rgba(255,255,255,.1) 18%, rgba(255,255,255,0) 65%);
}
.art-main .shape.two{
    width:150px;height:150px;
    right:18px;bottom:12px;
    background:
        radial-gradient(circle at 50% 50%, rgba(45,212,255,.95) 0%, rgba(45,212,255,.16) 20%, rgba(45,212,255,0) 62%);
    filter:blur(4px);
}

.art-top{
    background:
        linear-gradient(135deg, rgba(10,132,255,.95), rgba(15,22,43,.25) 55%, rgba(8,18,36,.92)),
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.25), transparent 25%);
}
.art-bottom{
    background:
        linear-gradient(145deg, rgba(7,12,22,.94), rgba(10,132,255,.18)),
        radial-gradient(circle at 70% 20%, rgba(45,212,255,.5), transparent 20%),
        radial-gradient(circle at 25% 75%, rgba(59,158,255,.35), transparent 18%);
}

.art-top .line,
.art-bottom .line{
    position:absolute;
    inset:auto;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(255,255,255,.0), rgba(255,255,255,.95), rgba(255,255,255,.0));
    opacity:.65;
    filter:blur(.5px);
}

.art-top .line.a{width:110px;height:2px;left:18px;top:22px;transform:rotate(-12deg)}
.art-top .line.b{width:80px;height:2px;right:18px;bottom:20px;transform:rotate(26deg)}
.art-bottom .line.a{width:100px;height:2px;right:16px;top:20px;transform:rotate(12deg)}
.art-bottom .line.b{width:70px;height:2px;left:18px;bottom:18px;transform:rotate(-28deg)}

.form-shell{
    margin-top:18px;
    display:grid;
    grid-template-columns:1.08fr .92fr;
    gap:18px;
}

.form-card{
    padding:28px 26px;
}

.section-title{
    font-size:1.1rem;
    font-weight:700;
    letter-spacing:-.3px;
    margin-bottom:16px;
}

.section-sub{
    color:var(--muted);
    font-size:.95rem;
    line-height:1.55;
    margin-top:8px;
    margin-bottom:18px;
}

.field{
    width:100%;
    border:none;
    outline:none;
    color:var(--text);
    background:rgba(6, 12, 24, .84);
    border:1px solid rgba(148,163,184,.22);
    border-radius:18px;
    padding:16px 18px;
    font-size:1rem;
    transition:all .22s ease;
    margin-bottom:12px;
    box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
}

.field::placeholder{color:#8ea0be}

.field:focus{
    border-color:rgba(10,132,255,.75);
    box-shadow:0 0 0 4px rgba(10,132,255,.16);
    background:rgba(6, 12, 24, .95);
}

.field.numeric{
    font-variant-numeric:tabular-nums;
    letter-spacing:.12px;
}

.btn-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:10px;
}

button{
    border:none;
    border-radius:18px;
    padding:15px 16px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease, opacity .2s ease;
    user-select:none;
}

button:active{transform:translateY(1px) scale(.99)}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg, var(--blue), var(--blue-2));
    box-shadow:0 14px 28px rgba(10,132,255,.34);
}

.btn-secondary{
    color:#eff6ff;
    background:rgba(10,15,29,.92);
    border:1px solid rgba(148,163,184,.24);
    box-shadow:0 8px 18px rgba(0,0,0,.22);
}

.btn-ghost{
    color:#dbeafe;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(148,163,184,.16);
}

button:hover{
    filter:brightness(1.04);
    transform:translateY(-1px);
}

.notice{
    margin-top:14px;
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(148,163,184,.16);
    background:rgba(8,14,28,.68);
    color:#c9d8ef;
    line-height:1.6;
    min-height:52px;
}

.notice.success{border-color:rgba(34,197,94,.24);color:#c9f7d5}
.notice.error{border-color:rgba(239,68,68,.24);color:#ffcbcb}
.notice.warn{border-color:rgba(250,204,21,.22);color:#ffe9aa}

.hr{
    width:100%;
    height:1px;
    margin:16px 0 16px;
    background:linear-gradient(90deg, transparent, rgba(10,132,255,.65), rgba(255,255,255,.18), rgba(10,132,255,.65), transparent);
    position:relative;
}
.hr::after{
    content:"";
    position:absolute;
    left:50%;top:50%;
    width:8px;height:8px;
    border-radius:999px;
    background:var(--cyan);
    transform:translate(-50%,-50%);
    box-shadow:0 0 18px var(--cyan);
}

.guest-shell{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.guest-left,
.guest-right{
    padding:26px 24px;
}

.location-card{
    display:grid;
    grid-template-columns:1.06fr .94fr;
    gap:16px;
    align-items:stretch;
}

.location-visual{
    min-height:240px;
    border-radius:24px;
    border:1px solid rgba(148,163,184,.18);
    background:
        radial-gradient(circle at 18% 26%, rgba(45,212,255,.95), transparent 10%),
        radial-gradient(circle at 72% 18%, rgba(10,132,255,.85), transparent 14%),
        radial-gradient(circle at 58% 70%, rgba(59,158,255,.55), transparent 18%),
        linear-gradient(145deg, #06101f 0%, #0b1730 40%, #101d37 100%);
    position:relative;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.28);
}
.location-visual::before{
    content:"";
    position:absolute;
    inset:18px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.06);
    background:
        linear-gradient(120deg, rgba(255,255,255,.04), transparent 18%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.18), transparent 18%);
}
.location-visual::after{
    content:"";
    position:absolute;
    width:240px;height:240px;
    right:-70px;bottom:-100px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(10,132,255,.35), rgba(10,132,255,0) 62%);
    filter:blur(12px);
}

.location-tag{
    position:absolute;
    left:18px;top:18px;
    padding:10px 13px;
    border-radius:999px;
    background:rgba(0,0,0,.34);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(14px);
    font-size:.88rem;
    color:#eff6ff;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.location-tag span{
    width:8px;height:8px;border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 14px rgba(34,197,94,.9);
}

.abstract-stack{
    position:absolute;
    left:0;right:0;bottom:0;
    display:flex;
    gap:10px;
    padding:14px;
}

.abstract-tile{
    flex:1;
    height:72px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    background:
        radial-gradient(circle at 22% 28%, rgba(255,255,255,.14), transparent 18%),
        linear-gradient(145deg, rgba(10,132,255,.18), rgba(255,255,255,.02));
    box-shadow:0 10px 22px rgba(0,0,0,.18);
}

.abstract-tile.mid{
    background:
        radial-gradient(circle at 70% 24%, rgba(45,212,255,.35), transparent 18%),
        linear-gradient(145deg, rgba(8,16,32,.85), rgba(10,132,255,.12));
}

.abstract-tile.last{
    background:
        radial-gradient(circle at 45% 35%, rgba(59,158,255,.42), transparent 16%),
        linear-gradient(145deg, rgba(5,10,18,.9), rgba(10,132,255,.15));
}

.linkbox{
    display:flex;
    flex-direction:column;
    gap:12px;
    justify-content:space-between;
}

.link-card{
    padding:18px 18px 17px;
    border-radius:22px;
    background:rgba(6, 12, 24, .74);
    border:1px solid rgba(148,163,184,.16);
    box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.link-label{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:.86rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.18px;
    font-weight:700;
    margin-bottom:8px;
}

.link-label .dot{
    width:8px;height:8px;border-radius:999px;background:var(--blue);
    box-shadow:0 0 14px rgba(10,132,255,.85);
}

.link-title{
    font-size:1.12rem;
    font-weight:800;
    letter-spacing:-.25px;
    line-height:1.18;
    margin-bottom:8px;
}

.link-desc{
    color:#c9d8ef;
    font-size:.94rem;
    line-height:1.65;
}

.link-action{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:12px;
    color:#dfeaff;
    font-weight:700;
    font-size:.95rem;
}

.link-action strong{
    color:#fff;
}

.status-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:12px;
    padding:10px 12px;
    border-radius:999px;
    font-size:.9rem;
    font-weight:700;
    background:rgba(10,132,255,.08);
    border:1px solid rgba(10,132,255,.16);
    color:#dcecff;
}

.status-badge i{
    width:8px;height:8px;border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 16px rgba(10,132,255,.8);
    display:inline-block;
}

.choice-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:14px;
}

.choice-btn{
    min-height:56px;
    border-radius:18px;
    border:1px solid rgba(148,163,184,.2);
    background:rgba(8,14,28,.85);
    color:#f3f8ff;
    font-weight:800;
    font-size:1rem;
    box-shadow:0 8px 18px rgba(0,0,0,.18);
}

.choice-btn.yes{
    background:linear-gradient(90deg, rgba(10,132,255,1), rgba(59,158,255,1));
    border-color:rgba(10,132,255,.42);
}
.choice-btn.no{
    background:linear-gradient(90deg, rgba(11,17,33,.94), rgba(16,24,45,.92));
}

.choice-btn.yes.selected{
    box-shadow:0 0 0 4px rgba(10,132,255,.16), 0 16px 28px rgba(10,132,255,.3);
}
.choice-btn.no.selected{
    box-shadow:0 0 0 4px rgba(239,68,68,.12), 0 16px 28px rgba(0,0,0,.22);
}

.divider{
    position:relative;
    margin:20px 0;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(10,132,255,.84), rgba(255,255,255,.15), rgba(10,132,255,.84), transparent);
}
.divider::after{
    content:"";
    position:absolute;
    left:50%;top:50%;
    width:10px;height:10px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:rgba(45,212,255,.95);
    box-shadow:0 0 20px rgba(45,212,255,.85);
}

.stats{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
    margin-bottom:16px;
}

.stat{
    padding:18px 16px;
    border-radius:22px;
    background:rgba(8,14,28,.68);
    border:1px solid rgba(148,163,184,.16);
    box-shadow:0 8px 18px rgba(0,0,0,.16);
}

.stat .k{
    font-size:.82rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.16px;
    font-weight:800;
}

.stat .v{
    margin-top:8px;
    font-size:1.6rem;
    font-weight:900;
    letter-spacing:-.5px;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    align-items:start;
}

.list-card{
    padding:24px;
}

.list-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
}

.list-header .title{
    font-size:1.15rem;
    font-weight:800;
    letter-spacing:-.2px;
}

.list-header .small{
    color:var(--muted);
    font-size:.92rem;
}

.list{
    list-style:none;
    display:grid;
    gap:10px;
}

.list-item{
    padding:15px 16px;
    border-radius:18px;
    background:rgba(8,14,28,.72);
    border:1px solid rgba(148,163,184,.15);
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
}

.list-item strong{
    display:block;
    font-size:1rem;
    line-height:1.35;
}

.list-item span{
    color:var(--muted);
    font-size:.92rem;
    display:block;
    margin-top:4px;
}

.badge{
    flex:0 0 auto;
    padding:8px 11px;
    border-radius:999px;
    font-size:.84rem;
    font-weight:800;
    white-space:nowrap;
    border:1px solid transparent;
}

.badge.yes{
    color:#dcfce7;
    background:rgba(34,197,94,.12);
    border-color:rgba(34,197,94,.2);
}
.badge.no{
    color:#fee2e2;
    background:rgba(239,68,68,.10);
    border-color:rgba(239,68,68,.18);
}
.badge.pending{
    color:#fde68a;
    background:rgba(250,204,21,.10);
    border-color:rgba(250,204,21,.18);
}

.footer-note{
    margin-top:14px;
    color:var(--muted);
    font-size:.92rem;
    line-height:1.6;
}

.hidden{display:none !important;}
