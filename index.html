<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a192f;
  color:#e0f2fe;
}

.container{max-width:500px;margin:auto;padding:20px;}

.card{
  background:#0f172a;
  border:1px solid #1e3a8a;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

input{
  background:#020617;
  color:white;
  border:1px solid #1e3a8a;
}

button{
  background:#2563eb;
  color:white;
}

.hidden{display:none;}

#reader{
  width:100%;
  min-height:300px;
  border-radius:10px;
  overflow:hidden;
}

li{
  background:#020617;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<!-- REGISTRO -->
<div id="registro" class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<input id="celular" placeholder="Celular">
<button onclick="registrar()">Entrar</button>
<p id="msg"></p>
</div>

<!-- INVITADO -->
<div id="invitado" class="card hidden">
<h2>Tu acceso</h2>
<div id="qr"></div>
<p id="info"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div class="card">
<h2>Planeación</h2>
<input id="planNombre" placeholder="Nombre permitido">
<button onclick="agregarPlaneacion()">Agregar</button>
<ul id="listaPlan"></ul>
</div>

<div class="card">
<h2>Invitados</h2>
<ul id="listaInvitados"></ul>
</div>

<div class="card">
<h2>Escáner</h2>
<button onclick="iniciarEscaner()">Abrir cámara</button>
<div id="reader"></div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
firebase.initializeApp({
  apiKey:"TU_API",
  authDomain:"TU_AUTH",
  projectId:"TU_ID"
});

const db = firebase.firestore();

let lector = null;

/* NORMALIZAR */
const norm = t => (t || "").trim().toLowerCase();

/* ================= REGISTRO ================= */
async function registrar(){

  const nombre = norm(document.getElementById("nombre").value);
  const celular = document.getElementById("celular").value;
  const msg = document.getElementById("msg");

  if(!nombre || !celular){
    msg.innerText = "Completa datos";
    return;
  }

  try{

    const plan = await db.collection("planeacion").get();

    let autorizado = false;

    plan.forEach(d=>{
      if(norm(d.data().nombre) === nombre){
        autorizado = true;
      }
    });

    if(!autorizado){
      msg.innerText = "No estás en lista";
      return;
    }

    const existing = await db.collection("invitados")
      .where("nombre","==",nombre)
      .get();

    if(!existing.empty){
      mostrar(nombre);
      return;
    }

    await db.collection("invitados").add({
      nombre,
      celular,
      asistio:false
    });

    mostrar(nombre);

  }catch(e){
    msg.innerText = "Error sistema";
    console.log(e);
  }
}

/* ================= MOSTRAR QR ================= */
function mostrar(nombre){

  document.getElementById("registro").classList.add("hidden");
  document.getElementById("invitado").classList.remove("hidden");

  document.getElementById("qr").innerHTML="";

  new QRCode(document.getElementById("qr"),{
    text:nombre,
    width:240,
    height:240
  });

  document.getElementById("info").innerText = nombre;
}

/* ================= PLANEACIÓN ================= */
async function agregarPlaneacion(){
  const n = norm(planNombre.value);
  if(!n)return;
  await db.collection("planeacion").add({nombre:n});
  planNombre.value="";
}

/* ================= LISTAS ================= */
function cargar(){

  db.collection("planeacion").onSnapshot(s=>{
    listaPlan.innerHTML="";
    s.forEach(d=>{
      listaPlan.innerHTML += `<li>${d.data().nombre}</li>`;
    });
  });

  db.collection("invitados").onSnapshot(s=>{
    listaInvitados.innerHTML="";
    s.forEach(d=>{
      const x=d.data();
      listaInvitados.innerHTML += `<li>${x.nombre} | ${x.asistio ? "✔" : "❌"}</li>`;
    });
  });

}

/* ================= ESCÁNER ROBUSTO ================= */
async function iniciarEscaner(){

  const reader = document.getElementById("reader");
  reader.innerHTML="";

  if(lector){
    try{ await lector.stop(); }catch(e){}
  }

  lector = new Html5Qrcode("reader");

  try{

    await lector.start(
      { facingMode:"environment" },
      { fps:15, qrbox:250 },

      async (qrText)=>{

        const nombre = norm(qrText);

        try{ await lector.stop(); }catch(e){}

        const res = await db.collection("invitados")
          .where("nombre","==",nombre)
          .get();

        if(res.empty){
          alert("No registrado");
          return;
        }

        const doc = res.docs[0];
        const data = doc.data();

        if(data.asistio){
          alert("Ya ingresó: " + data.nombre);
        }else{
          await doc.ref.update({asistio:true});
          alert("Bienvenido " + data.nombre);
        }

      }

    );

  }catch(err){
    console.log(err);
    alert("Error cámara");
  }

}

window.onload = cargar;

</script>

</body>
</html>
