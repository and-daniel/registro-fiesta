<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#0a192f,#020617);
  color:#e2e8f0;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0b1220;
  border:1px solid #1e3a8a;
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
  box-shadow:0 0 25px rgba(37,99,235,0.25);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  font-size:14px;
}

input{
  background:#020617;
  color:#e2e8f0;
  border:1px solid #1e3a8a;
}

button{
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(37,99,235,0.5);
}

.hidden{display:none;}

ul{list-style:none;padding:0;}

li{
  background:#020617;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #1e3a8a;
}

#qr{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

#reader{
  width:100%;
  border-radius:10px;
  overflow:hidden;
}

.success{color:#22c55e;}
.error{color:#ef4444;}
.warn{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<div id="registro" class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<input id="celular" placeholder="Celular">
<input id="codigo" placeholder="Código admin (opcional)">
<button onclick="registrar()">Continuar</button>
<p id="msg"></p>
</div>

<div id="invitado" class="card hidden">
<h2>Tu QR</h2>
<div id="qr"></div>
<p style="text-align:center">Haz captura</p>
</div>

<div id="admin" class="hidden">

<div class="card">
<h2>Agregar a Planeación</h2>
<input id="planNombre" placeholder="Nombre">
<button onclick="agregarPlaneacion()">Agregar</button>
</div>

<div class="card">
<h2>Planeación</h2>
<ul id="listaPlan"></ul>
</div>

<div class="card">
<h2>Registrados</h2>
<ul id="listaInvitados"></ul>
</div>

<div class="card">
<h2>Escanear QR</h2>
<button onclick="iniciarEscaner()">Abrir cámara</button>
<div id="reader"></div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWyE5VZXL5j4iFdOQoVRQ-2_DB0Eo3f6U",
  authDomain: "fiesta-qr-55d9a.firebaseapp.com",
  projectId: "fiesta-qr-55d9a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* REGISTRO */
async function registrar(){

  const nombreInput = nombre.value.trim().toLowerCase();
  const celularVal = celular.value.trim();
  const codigoVal = codigo.value;

  if(!nombreInput || !celularVal){
    msg.innerText="Completa datos";
    msg.className="warn";
    return;
  }

  if(codigoVal==="142534"){
    localStorage.setItem("admin","true");
    registro.classList.add("hidden");
    admin.classList.remove("hidden");
    cargarPlaneacion();
    cargarInvitados();
    return;
  }

  const res = await db.collection("invitados")
    .where("celular","==",celularVal)
    .get();

  if(!res.empty){
    const d = res.docs[0].data();
    mostrarQR(d.qr);
    msg.innerText="Sesión recuperada";
    msg.className="success";
    return;
  }

  const palabrasUsuario = nombreInput.split(" ");
  const resPlan = await db.collection("planeacion").get();

  let autorizado=false;

  resPlan.forEach(doc=>{
    const palabrasPlan = doc.data().nombre.toLowerCase().split(" ");
    palabrasPlan.forEach(p=>{
      if(palabrasUsuario.includes(p)) autorizado=true;
    });
  });

  if(!autorizado){
    msg.innerText="No estás en lista";
    msg.className="error";
    return;
  }

  const qrCode = "QR-"+Date.now()+"-"+Math.random().toString(36).substring(2,10);

  await db.collection("invitados").add({
    nombre:nombreInput,
    celular:celularVal,
    qr:qrCode,
    asistio:false
  });

  mostrarQR(qrCode);
  msg.innerText="Registro exitoso";
  msg.className="success";
}

/* MOSTRAR QR */
function mostrarQR(texto){
  registro.classList.add("hidden");
  invitado.classList.remove("hidden");

  const cont = document.getElementById("qr");
  cont.innerHTML="";

  new QRCode(cont,{
    text:texto,
    width:240,
    height:240,
    colorDark:"#000000",
    colorLight:"#ffffff",
    correctLevel:QRCode.CorrectLevel.H
  });
}

/* ADMIN */
function agregarPlaneacion(){
  const n = planNombre.value.trim().toLowerCase();
  if(!n)return;
  db.collection("planeacion").add({nombre:n});
  planNombre.value="";
}

function cargarPlaneacion(){
  db.collection("planeacion").onSnapshot(snap=>{
    listaPlan.innerHTML="";
    snap.forEach(doc=>{
      const li=document.createElement("li");
      li.innerText=doc.data().nombre;
      listaPlan.appendChild(li);
    });
  });
}

function cargarInvitados(){
  db.collection("invitados").onSnapshot(snap=>{
    listaInvitados.innerHTML="";
    snap.forEach(doc=>{
      const d=doc.data();
      const li=document.createElement("li");
      li.innerText=d.nombre+" | "+d.celular+" | "+(d.asistio?"✔":"❌");
      listaInvitados.appendChild(li);
    });
  });
}

/* ESCÁNER PRO */
let lector=null;

function iniciarEscaner(){

  const cont=document.getElementById("reader");
  cont.innerHTML="";

  if(lector){
    try{lector.stop();}catch(e){}
  }

  lector=new Html5Qrcode("reader");

  lector.start(
    {facingMode:"environment"},
    {
      fps:15,
      qrbox:{width:280,height:280}
    },

    async(qrText)=>{

      alert("QR: "+qrText);

      try{await lector.stop();}catch(e){}

      const res=await db.collection("invitados")
        .where("qr","==",qrText)
        .get();

      if(res.empty){
        alert("QR inválido");
        return;
      }

      res.forEach(async(doc)=>{
        const d=doc.data();

        if(d.asistio){
          alert("Ya ingresó: "+d.nombre);
        }else{
          await doc.ref.update({asistio:true});
          alert("Bienvenido "+d.nombre);
        }
      });

    }
  ).catch(err=>{
    alert("Error cámara: "+err);
  });
}

/* AUTO ADMIN */
window.addEventListener("load",()=>{
  if(localStorage.getItem("admin")==="true"){
    registro.classList.add("hidden");
    admin.classList.remove("hidden");
    cargarPlaneacion();
    cargarInvitados();
  }
});
</script>

</body>
</html>
